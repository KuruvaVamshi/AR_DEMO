<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marker-based AR</title>
  <!-- Modern Google Font for the UI -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- A-Frame and MindAR Scripts -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
    }

    #ui-container {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 1000;
      pointer-events: none;
      /* Let clicks pass through to AR canvas if needed */
      display: flex;
      justify-content: center;
    }

    .instruction-pill {
      background: rgba(20, 20, 20, 0.85);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .scanning {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    /* Optional: A loading screen while MindAR initializes */
    #loader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #111;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loader-content {
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loader">
    <div class="loader-content">
      <div class="spinner" style="margin: 0 auto 20px;"></div>
      <div>Initializing AR Engine...</div>
    </div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-container">
    <div class="instruction-pill scanning" id="status-text">Scan the pen</div>
  </div>

  <!-- 
      MindAR Scene
      IMPORTANT: Change "assets/targets.mind" to the path of your compiled .mind file from the MindAR compiler tool.
      The .mind file contains the visual signatures of your targets. Target 0 is the first image you upload, Target 1 is the second, etc.
    -->
  <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001; uiScanning: no;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: The Pen -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-pen">
      <!-- Pen Parts arranged for the horizontal pen image -->
      
      <!-- Top Left (Above the cap): Clip -->
      <a-text value="Gold Pocket Clip" color="#ffeb3b" align="center" position="-0.4 0.3 0" scale="0.4 0.4 0.4"></a-text>
      
      <!-- Bottom Left (Below the cap): Cap -->
      <a-text value="Pen Cap" color="#ffffff" align="center" position="-0.4 -0.3 0" scale="0.4 0.4 0.4"></a-text>
      
      <!-- Top Right (Above the barrel): Logo -->
      <a-text value="Brand Logo" color="#03a9f4" align="center" position="0.4 0.3 0" scale="0.4 0.4 0.4"></a-text>
      
      <!-- Bottom Right (Below the barrel): Barrel -->
      <a-text value="Ink Barrel" color="#4caf50" align="center" position="0.4 -0.3 0" scale="0.4 0.4 0.4"></a-text>
      
      <!-- Center (Gold Band) -->
      <a-text value="Gold Accent Band" color="#ff9800" align="center" position="0 -0.4 0" scale="0.3 0.3 0.3"></a-text>
    </a-entity>
  </a-scene>

  <script>
    // Logic for handling AR target detection and media playback
    document.addEventListener("DOMContentLoaded", function () {
      const sceneEl = document.querySelector('a-scene');
      const penTarget = document.querySelector('#target-pen');
      const statusText = document.querySelector('#status-text');
      const loader = document.querySelector('#loader');

      // Hide loader when AR engine is ready
      sceneEl.addEventListener("arReady", (event) => {
        loader.style.display = 'none';
      });

      // Error handling if camera permission denied
      sceneEl.addEventListener("arError", (event) => {
        loader.querySelector('.loader-content').innerHTML = "<div style='color: #ff4444'>Camera permission is required for AR. Please allow access and reload.</div>";
      });

      // --- Target 0 (Pen with Features) ---
      penTarget.addEventListener("targetFound", event => {
        console.log("Pen target found");
        statusText.innerText = "Showing Pen Parts...";
        statusText.classList.remove('scanning');
      });

      penTarget.addEventListener("targetLost", event => {
        console.log("Pen target lost");
        statusText.innerText = "Scan the pen";
        statusText.classList.add('scanning');
      });
    });
  </script>
</body>

</html>
